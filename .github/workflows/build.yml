name: Cloudlog Helper Cross Build

permissions:
  contents: write
  actions: write

on:
  push:
  pull_request:

jobs:
  exec-tests:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Execute test
        run: |
          dotnet test

  build-release:
    needs: exec-tests
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'
      
      - name: Build application
        shell: pwsh
        run: |
          $tagName = "${{ github.ref_name }}"
          if ([string]::IsNullOrEmpty($tagName)) {
            $tagName = "dev"
          }else{
            $tagName = $tagName -replace '^[vV]', ''
          }
          ./ci.ps1 -Version "$tagName"
          
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-outputs
          path: src/CloudlogHelper/bin/*.zip
          
  do-chmod:
    needs: build-release
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-outputs
          path: ./downloaded-builds
          
      - name: unzip and repack
        shell: bash
        run: |
          for zip_file in downloaded-builds/*.zip; do
           [ -f "$zip_file" ] || continue
           if [[ $(basename "$zip_file") =~ [Ll]inux|[Oo][Ss][Xx] ]]; then
             temp_dir=$(mktemp -d)
             unzip -q "$zip_file" -d "$temp_dir"
             find "$temp_dir" -type f -name "CloudlogHelper" -exec chmod +x {} \;
             rm -f "$zip_file"
             (cd "$temp_dir" && zip -q -r "$OLDPWD/$zip_file" .)
             rm -rf "$temp_dir"
           fi
          done

      - name: Release it
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            downloaded-builds/*.zip
